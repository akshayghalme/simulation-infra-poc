# ---------------------------------------------------------------------------
# Self-Service Simulation Infrastructure Deployment
# ---------------------------------------------------------------------------
# Trigger: Manual (workflow_dispatch) with instance type selection
# Pipeline: Security Scan → Terraform Plan → Terraform Apply
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
# ---------------------------------------------------------------------------

name: Deploy Simulation Infrastructure

on:
  workflow_dispatch:
    inputs:
      instance_type:
        description: "EC2 Instance Type"
        required: true
        type: choice
        default: "t3.medium"
        options:
          - t3.micro       # Free Tier (smoke tests)
          - t3.medium      # General purpose (dev/test)
          - t3.large       # Light simulations
          - t3.xlarge      # Medium simulations
          - c5.xlarge      # Compute-optimized CFD
          - c5.2xlarge     # Heavy CFD workloads
          - r5.large       # Memory-optimized CAD assemblies

      action:
        description: "Terraform Action"
        required: true
        type: choice
        default: "plan"
        options:
          - plan           # Preview changes only
          - apply          # Deploy infrastructure
          - destroy        # Tear down infrastructure

      environment:
        description: "Target Environment"
        required: true
        type: choice
        default: "poc"
        options:
          - poc
          - staging

env:
  TF_VERSION: "1.7.0"
  WORKING_DIR: "./terraform"
  AWS_REGION: "ap-south-1"

permissions:
  contents: read
  id-token: write    # Required if using OIDC-based AWS auth in future

jobs:
  # -------------------------------------------------------------------
  # Job 1: Security Scan — Shift-left policy enforcement
  # -------------------------------------------------------------------
  security-scan:
    name: "Security Scan (Checkov)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.WORKING_DIR }}
          framework: terraform
          output_format: cli
          soft_fail: false          # Block deploy on security failures
          quiet: true               # Only show failed checks
          # Intentional PoC tradeoffs (documented in README):
          #   CKV_AWS_88  — EC2 has public IP (needed for direct SSH)
          #   CKV_AWS_24  — SSH from 0.0.0.0/0 (PoC default; restrict in prod)
          #   CKV_AWS_130 — subnet assigns public IP on launch
          #   CKV_AWS_382 — SG egress to 0.0.0.0/0 (needed for package installs)
          #   CKV2_AWS_11 — VPC flow logs (out of scope for PoC)
          #   CKV2_AWS_12 — default SG hardening (out of scope for PoC)
          #   CKV2_AWS_41 — IAM role on EC2 (would use SSM in prod)
          skip_check: CKV_AWS_88,CKV_AWS_24,CKV_AWS_130,CKV_AWS_382,CKV2_AWS_11,CKV2_AWS_12,CKV2_AWS_41

      - name: Scan summary
        if: always()
        run: |
          echo "## Security Scan Complete" >> $GITHUB_STEP_SUMMARY
          echo "Checkov scanned Terraform files for misconfigurations." >> $GITHUB_STEP_SUMMARY
          echo "Skipped checks: CKV_AWS_88 (public IP — required for direct simulation access)" >> $GITHUB_STEP_SUMMARY

  # -------------------------------------------------------------------
  # Job 2: Terraform — Plan and optionally Apply/Destroy
  # -------------------------------------------------------------------
  terraform:
    name: "Terraform ${{ github.event.inputs.action }}"
    runs-on: ubuntu-latest
    needs: security-scan
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        id: init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="instance_type=${{ github.event.inputs.instance_type }}" \
            -var="environment=${{ github.event.inputs.environment }}" \
            -out=tfplan \
            -input=false

      - name: Post plan summary
        if: always()
        run: |
          echo "## Terraform Plan Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Action | \`${{ github.event.inputs.action }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Instance Type | \`${{ github.event.inputs.instance_type }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ github.event.inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered By | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: |
          terraform destroy \
            -var="instance_type=${{ github.event.inputs.instance_type }}" \
            -var="environment=${{ github.event.inputs.environment }}" \
            -auto-approve

  # -------------------------------------------------------------------
  # Job 3: Post-Deploy — Run cost guard as a sanity check
  # -------------------------------------------------------------------
  cost-guard:
    name: "Cost Guard Check"
    runs-on: ubuntu-latest
    needs: terraform
    if: github.event.inputs.action == 'apply'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install boto3

      - name: Run Cost Guard (dry-run)
        run: python scripts/cleanup.py --dry-run
        working-directory: "."
